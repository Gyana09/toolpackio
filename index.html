```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Professional Passport Photo Print Maker</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.12/cropper.min.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.12/cropper.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f4f4;
color:#222;
}

header{
background:#fff;
padding:15px 20px;
font-size:22px;
font-weight:bold;
border-bottom:1px solid #ddd;
}

.container{
padding:20px;
max-width:1200px;
margin:auto;
}

.upload-box{
background:#fff;
border:2px dashed #888;
padding:40px;
text-align:center;
border-radius:12px;
cursor:pointer;
}

.upload-box:hover{
border-color:#007bff;
}

.upload-box input{
display:none;
}

#thumbnail-container{
display:flex;
gap:10px;
overflow-x:auto;
margin-top:20px;
padding-bottom:10px;
}

#thumbnail-container img{
width:80px;
height:100px;
object-fit:cover;
border:3px solid #ccc;
border-radius:6px;
cursor:pointer;
}

#thumbnail-container img.active{
border-color:#007bff;
}

#thumbnail-container img.saved{
border-color:green;
}

.crop-section{
margin-top:20px;
display:none;
}

.crop-container{
display:flex;
gap:20px;
flex-wrap:wrap;
}

.left{
flex:1;
min-width:300px;
background:#000;
height:600px;
overflow:hidden;
}

.left img{
width:100%;
display:block;
}

.right{
width:300px;
background:#fff;
padding:20px;
border-radius:10px;
}

.right label{
display:block;
margin-top:15px;
margin-bottom:5px;
font-weight:bold;
}

.right select,
.right input{
width:100%;
padding:10px;
}

.btn{
padding:12px;
border:none;
cursor:pointer;
border-radius:8px;
font-weight:bold;
margin-top:15px;
width:100%;
}

.btn-primary{
background:#007bff;
color:#fff;
}

.btn-success{
background:green;
color:#fff;
}

.print-section{
display:none;
margin-top:20px;
}

#print-preview-container{
position:relative;
background:#fff;
margin:auto;
border:1px solid #ccc;
overflow:hidden;
}

#print-preview-container img{
position:absolute;
object-fit:cover;
border:1px solid #000;
box-sizing:border-box;
image-rendering:auto;
}

.info{
margin-top:15px;
font-size:18px;
font-weight:bold;
text-align:center;
}

</style>
</head>

<body>

<header>
Professional Passport Photo Print Maker
</header>

<div class="container">

<label class="upload-box">

<input type="file" id="image-input" accept="image/*" multiple>

<h2>Upload Photos</h2>
<p>Click or Drag & Drop</p>

</label>

<div id="thumbnail-container"></div>

<div class="crop-section" id="crop-section">

<div class="crop-container">

<div class="left">
<img id="image-to-crop">
</div>

<div class="right">

<label>Photo Size</label>

<select id="photo-size">
<option value="passport">Passport (3.5 × 4.5 cm)</option>
</select>

<label>Border Color</label>
<input type="color" id="border-color" value="#000000">

<label>Border Width</label>
<input type="range" id="border-width" min="1" max="8" value="2">

<button class="btn btn-primary" id="save-crop">
Save Crop
</button>

<button class="btn btn-success" id="go-print">
Go To Print
</button>

</div>

</div>

</div>

<div class="print-section" id="print-section">

<div style="margin-bottom:20px;">

<select id="paper-size">

<option value="4x6">4×6 Paper (8 Photos)</option>

<option value="a4">A4 Paper (30 Photos)</option>

</select>

<button class="btn btn-success" id="download-btn">
Download PDF
</button>

</div>

<div id="print-preview-container"></div>

<div class="info" id="count-info"></div>

</div>

</div>

<script>

const $ = id => document.getElementById(id);

let uploadedFiles = [];
let croppedPhotos = [];
let cropper = null;
let currentIndex = 0;

const DPI = 300;

const imageInput = $('image-input');

imageInput.addEventListener('change', e => {

const files = Array.from(e.target.files);

uploadedFiles = files;

croppedPhotos = new Array(files.length).fill(null);

$('thumbnail-container').innerHTML = '';

files.forEach((file,index)=>{

const reader = new FileReader();

reader.onload = ev => {

const img = document.createElement('img');

img.src = ev.target.result;

img.dataset.index = index;

img.addEventListener('click',()=>switchTo(index));

$('thumbnail-container').appendChild(img);

if(index===0){
switchTo(0);
}

};

reader.readAsDataURL(file);

});

$('crop-section').style.display='block';

});

function switchTo(index){

currentIndex = index;

const file = uploadedFiles[index];

const reader = new FileReader();

reader.onload = ev => {

$('image-to-crop').src = ev.target.result;

if(cropper){
cropper.destroy();
}

cropper = new Cropper($('image-to-crop'),{

aspectRatio:3.5/4.5,
viewMode:1,
dragMode:'move',
background:false,
autoCropArea:0.9

});

};

reader.readAsDataURL(file);

document.querySelectorAll('#thumbnail-container img').forEach(img=>{
img.classList.remove('active');
});

document.querySelector(`#thumbnail-container img[data-index="${index}"]`).classList.add('active');

}

$('save-crop').addEventListener('click',()=>{

if(!cropper)return;

const pw = Math.round(3.5 * DPI / 2.54);
const ph = Math.round(4.5 * DPI / 2.54);

const raw = cropper.getCroppedCanvas({

width:pw,
height:ph,
imageSmoothingEnabled:true,
imageSmoothingQuality:'high'

});

const canvas = document.createElement('canvas');

canvas.width = pw;
canvas.height = ph;

const ctx = canvas.getContext('2d');

ctx.drawImage(raw,0,0);

const borderWidth = parseInt($('border-width').value);

ctx.strokeStyle = $('border-color').value;

ctx.lineWidth = borderWidth * 2;

ctx.strokeRect(0,0,pw,ph);

croppedPhotos[currentIndex] = canvas.toDataURL('image/jpeg',1.0);

document.querySelector(`#thumbnail-container img[data-index="${currentIndex}"]`)
.classList.add('saved');

alert('Photo Saved');

});

$('go-print').addEventListener('click',()=>{

const valid = croppedPhotos.filter(Boolean);

if(!valid.length){

alert('Please save at least one photo');

return;

}

$('print-section').style.display='block';

updatePreview();

window.scrollTo({
top:document.body.scrollHeight,
behavior:'smooth'
});

});

$('paper-size').addEventListener('change',updatePreview);

function getPaper(){

const v = $('paper-size').value;

if(v==='a4'){

return{
w:21,
h:29.7,
margin:0.5,
rows:6,
cols:5,
max:30,
land:false
};

}

return{
w:15.24,
h:10.16,
margin:0.4,
rows:2,
cols:4,
max:8,
land:true
};

}

function updatePreview(){

const cont = $('print-preview-container');

cont.innerHTML='';

const list = croppedPhotos.filter(Boolean);

if(!list.length)return;

const paper = getPaper();

const {w,h,margin,rows,cols,max} = paper;

cont.style.width='100%';

cont.style.maxWidth='700px';

cont.style.aspectRatio=`${w}/${h}`;

const photoW = 3.5;
const photoH = 4.5;

const usableW = w - (margin*2);
const usableH = h - (margin*2);

const gapX = (usableW - (cols*photoW))/(cols-1);
const gapY = (usableH - (rows*photoH))/(rows-1);

let placed = 0;

for(let i=0;i<Math.min(list.length,max);i++){

const row = Math.floor(i/cols);
const col = i%cols;

const x = margin + col*(photoW+gapX);
const y = margin + row*(photoH+gapY);

const img = document.createElement('img');

img.src = list[i];

img.style.left = `${(x/w)*100}%`;
img.style.top = `${(y/h)*100}%`;
img.style.width = `${(photoW/w)*100}%`;
img.style.height = `${(photoH/h)*100}%`;

cont.appendChild(img);

placed++;

}

$('count-info').innerHTML =
`${placed} Photos Ready`;

}

$('download-btn').addEventListener('click',()=>{

const list = croppedPhotos.filter(Boolean);

if(!list.length){

alert('No photos');

return;

}

const { jsPDF } = window.jspdf;

const paper = getPaper();

const {w,h,margin,rows,cols,max,land} = paper;

const doc = new jsPDF({

orientation: land ? 'landscape' : 'portrait',
unit:'cm',
format:[w,h]

});

const photoW = 3.5;
const photoH = 4.5;

const usableW = w - (margin*2);
const usableH = h - (margin*2);

const gapX = (usableW - (cols*photoW))/(cols-1);
const gapY = (usableH - (rows*photoH))/(rows-1);

const total = Math.min(list.length,max);

for(let i=0;i<total;i++){

const row = Math.floor(i/cols);
const col = i%cols;

const x = margin + col*(photoW+gapX);
const y = margin + row*(photoH+gapY);

doc.addImage(
list[i],
'JPEG',
x,
y,
photoW,
photoH
);

}

doc.save('passport_photos.pdf');

});

</script>

</body>
</html>
